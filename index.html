<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Release Dashboard</title>
  <style>
    :root {
      --bg: #f6f8fc;
      --text: #101828;
      --muted: #667085;
      --card-border: rgba(16, 24, 40, 0.08);
      --shadow: 0 10px 28px rgba(16, 24, 40, 0.08);
      --shadow-hover: 0 16px 36px rgba(16, 24, 40, 0.14);
      --radius: 20px;
      --green: #15803d;
      --red: #dc2626;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
      color: var(--text);
      padding: 24px;
    }

    .page {
      max-width: 1240px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .header h1 {
      margin: 0;
      font-size: 32px;
      letter-spacing: -0.03em;
    }

    .header p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .search {
      min-width: 260px;
      max-width: 360px;
      width: 100%;
      padding: 12px 14px;
      border: 1px solid rgba(16, 24, 40, 0.12);
      border-radius: 14px;
      font-size: 14px;
      outline: none;
      background: rgba(255, 255, 255, 0.9);
    }

    .search:focus {
      border-color: rgba(99, 102, 241, 0.45);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.08);
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .count {
      font-size: 14px;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 18px;
    }

    .card {
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      min-height: 220px;
      position: relative;
      overflow: hidden;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0));
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 12px;
      margin-bottom: 12px;
    }

    .title {
      font-size: 22px;
      font-weight: 800;
      margin: 0;
      letter-spacing: -0.02em;
      line-height: 1.15;
    }

    .product {
      margin-top: 6px;
      font-size: 14px;
      color: rgba(16, 24, 40, 0.78);
      font-weight: 700;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      background: rgba(255,255,255,0.55);
      border: 1px solid rgba(16, 24, 40, 0.06);
    }

    .meta {
      font-size: 14px;
      margin: 8px 0;
      color: rgba(16, 24, 40, 0.9);
    }

    .subtle {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }

    .stats {
      margin-top: 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat-total {
      grid-column: 1 / -1;
      padding: 14px 14px 12px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(16, 24, 40, 0.06);
    }

    .stat-pair {
      padding: 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(16, 24, 40, 0.06);
      min-height: 74px;
    }

    .stat-label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 800;
      line-height: 1;
    }

    .stat-total .stat-value {
      color: #111827;
    }

    .done .stat-value {
      color: var(--green);
    }

    .pending .stat-value {
      color: var(--red);
    }

    .empty,
    .loading {
      padding: 24px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed rgba(16, 24, 40, 0.15);
      border-radius: 18px;
      background: rgba(255,255,255,0.7);
    }

    /* pastel colors by product */
    .distribution { background: #e3f2fd; }
    .opera { background: #efebe9; }
    .rna { background: #fdecea; }
    .purple { background: #f3e8ff; }
    .green { background: #e8f7ef; }
    .yellow { background: #fff8db; }
    .blue { background: #e8f1ff; }
    .pink { background: #fde8f2; }
    .mint { background: #e7fbf6; }
    .peach { background: #fff1e6; }

    /* Modal */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.46);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 50;
    }

    .overlay.show {
      display: flex;
    }

    .modal {
      width: min(920px, 100%);
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      overflow: hidden;
      border: 1px solid rgba(16, 24, 40, 0.08);
    }

    .modal-header {
      padding: 22px 22px 16px;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: start;
      border-bottom: 1px solid rgba(16, 24, 40, 0.08);
    }

    .modal-header h2 {
      margin: 0;
      font-size: 24px;
      letter-spacing: -0.02em;
    }

    .close-btn {
      border: none;
      background: rgba(16, 24, 40, 0.06);
      border-radius: 12px;
      width: 40px;
      height: 40px;
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
    }

    .modal-body {
      padding: 22px;
    }

    .pod-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 12px;
      margin-top: 8px;
    }

    .pod-card {
      padding: 16px;
      border-radius: 16px;
      background: #f8fafc;
      border: 1px solid rgba(16, 24, 40, 0.08);
    }

    .pod-name {
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 10px;
      color: var(--text);
    }

    .mini-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .mini-box {
      padding: 12px;
      border-radius: 14px;
      background: white;
      border: 1px solid rgba(16, 24, 40, 0.08);
    }

    .mini-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }

    .mini-value {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.1;
    }

    .link-row {
      margin-top: 22px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .link-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
      border-radius: 12px;
      border: none;
      background: #111827;
      color: white;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }

    .secondary-btn {
      background: #e5e7eb;
      color: #111827;
    }

    @media (max-width: 640px) {
      body { padding: 14px; }
      .header h1 { font-size: 26px; }
      .mini-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="header">
      <div>
        <h1>Release Dashboard</h1>
        <p>Release cards with POD-wise breakdown</p>
      </div>

      <input
        id="search"
        class="search"
        type="text"
        placeholder="Search product or release..."
      />
    </div>

    <div class="toolbar">
      <div class="count" id="count">Loading releases...</div>
    </div>

    <div id="status" class="loading">Loading dashboard...</div>
    <div id="cards" class="grid" style="display:none;"></div>
  </div>

  <div id="overlay" class="overlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-header">
        <div>
          <h2 id="modalTitle">Release details</h2>
          <div id="modalSubtitle" class="subtle"></div>
        </div>
        <button class="close-btn" id="closeBtn" aria-label="Close details">×</button>
      </div>

      <div class="modal-body">
        <div id="modalContent"></div>

        <div class="link-row">
          <a id="jiraLink" class="link-btn" href="#" target="_blank" rel="noopener noreferrer">Open Jira Link</a>
          <button id="closeBtn2" class="link-btn secondary-btn" type="button">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const cardsEl = document.getElementById('cards');
    const statusEl = document.getElementById('status');
    const countEl = document.getElementById('count');
    const searchEl = document.getElementById('search');

    const overlay = document.getElementById('overlay');
    const modalTitle = document.getElementById('modalTitle');
    const modalSubtitle = document.getElementById('modalSubtitle');
    const modalContent = document.getElementById('modalContent');
    const jiraLink = document.getElementById('jiraLink');
    const closeBtn = document.getElementById('closeBtn');
    const closeBtn2 = document.getElementById('closeBtn2');

    let allData = [];

    function esc(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function getColorClass(item) {
      if (item.colorKey) return item.colorKey;
      const product = (item.product || '').toLowerCase();
      if (product.includes('distribution')) return 'distribution';
      if (product.includes('opera')) return 'opera';
      if (product.includes('rna') || product.includes('r&a')) return 'rna';
      return 'blue';
    }

    function renderCards(data) {
      cardsEl.innerHTML = '';

      if (!data.length) {
        cardsEl.style.display = 'none';
        statusEl.style.display = 'block';
        statusEl.className = 'empty';
        statusEl.textContent = 'No releases found.';
        countEl.textContent = '0 releases';
        return;
      }

      statusEl.style.display = 'none';
      cardsEl.style.display = 'grid';
      countEl.textContent = `${data.length} release${data.length === 1 ? '' : 's'}`;

      data.forEach(item => {
        const colorClass = getColorClass(item);
        const total = item.total ?? 0;
        const done = item.done ?? 0;
        const pending = item.pending ?? 0;

        const card = document.createElement('div');
        card.className = `card ${colorClass}`;
        card.tabIndex = 0;

        card.innerHTML = `
          <div class="card-top">
            <div>
              <div class="title">${esc(item.release || '')}</div>
              <div class="product">${esc(item.product || '')}</div>
            </div>
            <div class="badge">${esc(item.status || 'Open')}</div>
          </div>

          <div class="meta"><strong>Target date:</strong> ${esc(item.date || 'TBD')}</div>
          <div class="subtle">${esc(item.summary || 'Click to view POD-wise breakdown.')}</div>

          <div class="stats">
            <div class="stat-total">
              <span class="stat-label">Total</span>
              <span class="stat-value">${esc(total)}</span>
            </div>

            <div class="stat-pair done">
              <span class="stat-label">Done</span>
              <span class="stat-value">${esc(done)}</span>
            </div>

            <div class="stat-pair pending">
              <span class="stat-label">Pending</span>
              <span class="stat-value">${esc(pending)}</span>
            </div>
          </div>
        `;

        card.addEventListener('click', () => openModal(item));
        card.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            openModal(item);
          }
        });

        cardsEl.appendChild(card);
      });
    }

    function openModal(item) {
      modalTitle.textContent = `${item.release || 'Release details'}`;
      modalSubtitle.textContent = `${item.product || ''}${item.channel_name ? ' • ' + item.channel_name : ''}`;

      const pods = Array.isArray(item.podBreakdown) ? item.podBreakdown : [];

      if (!pods.length) {
        modalContent.innerHTML = `
          <div class="empty">No POD breakdown is available yet.</div>
        `;
      } else {
        modalContent.innerHTML = `
          <div class="pod-grid">
            ${pods.map(pod => `
              <div class="pod-card">
                <div class="pod-name">${esc(pod.pod || 'POD')}</div>
                <div class="mini-grid">
                  <div class="mini-box">
                    <div class="mini-label">Done</div>
                    <div class="mini-value" style="color:#15803d;">${esc(pod.done ?? 0)}</div>
                  </div>
                  <div class="mini-box">
                    <div class="mini-label">Pending</div>
                    <div class="mini-value" style="color:#dc2626;">${esc(pod.pending ?? 0)}</div>
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
        `;
      }

      const url = item.jiraUrl || item.ticketsUrl || '#';
      jiraLink.href = url;
      jiraLink.style.pointerEvents = url === '#' ? 'none' : 'auto';
      jiraLink.style.opacity = url === '#' ? '0.5' : '1';
      jiraLink.textContent = url === '#' ? 'No Jira link yet' : 'Open Jira Link';

      overlay.classList.add('show');
      overlay.setAttribute('aria-hidden', 'false');
    }

    function closeModal() {
      overlay.classList.remove('show');
      overlay.setAttribute('aria-hidden', 'true');
    }

    closeBtn.addEventListener('click', closeModal);
    closeBtn2.addEventListener('click', closeModal);

    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) closeModal();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });

    searchEl.addEventListener('input', () => {
      const q = searchEl.value.trim().toLowerCase();
      const filtered = allData.filter(item => {
        const text = `${item.product || ''} ${item.release || ''} ${item.status || ''} ${item.date || ''} ${item.channel_name || ''}`.toLowerCase();
        return text.includes(q);
      });
      renderCards(filtered);
    });

    fetch('data.json')
      .then(response => {
        if (!response.ok) {
          throw new Error('Could not load data.json');
        }
        return response.json();
      })
      .then(data => {
        allData = Array.isArray(data) ? data : [];
        renderCards(allData);
      })
      .catch(error => {
        console.error(error);
        statusEl.style.display = 'block';
        statusEl.className = 'empty';
        statusEl.textContent = 'Could not load data.json.';
        countEl.textContent = '0 releases';
      });
  </script>
</body>
</html>
